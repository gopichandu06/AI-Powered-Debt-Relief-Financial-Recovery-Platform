version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finrelief-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-min-32-characters}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - DATABASE_URL=sqlite:///./data/finrelief.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEBUG=false
      - CORS_ORIGINS=["http://localhost:80","http://localhost:3000","http://localhost:5173"]
    volumes:
      - finrelief_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finrelief-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  finrelief_data:
    driver: local

networks:
  default:
    name: finrelief-network
